version: '3.8'

services:
  # PostgreSQL with TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: smartroute_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: smartroute
    ports:
      - "5432:5432"
    volumes:
      - smartroute_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    command: postgres -c "max_connections=200"

  # Redis for caching & websockets
  redis:
    image: redis:7-alpine
    container_name: smartroute_redis
    ports:
      - "6379:6379"
    volumes:
      - smartroute_redisdata:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  smartroute_pgdata:
  smartroute_redisdata:
